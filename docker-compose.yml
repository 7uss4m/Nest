
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nest
      POSTGRES_USER: nest
      POSTGRES_PASSWORD: nest_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nest"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/receipts;
        mc mb --ignore-existing local/asset-attachments;
        mc anonymous set download local/receipts;
      "

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=nest;Username=nest;Password=nest_dev"
      Jwt__Key: "${JWT_KEY:-CHANGE_ME_IN_PRODUCTION_USE_32_CHARS_MIN}"
      Jwt__Issuer: nest-api
      Jwt__Audience: nest-web
      MinIO__Endpoint: minio:9000
      MinIO__AccessKey: minioadmin
      MinIO__SecretKey: minioadmin
      Ntfy__BaseUrl: "${NTFY_URL:-https://ntfy.sh}"
      Ntfy__Token: "${NTFY_TOKEN:-}"
      Email__SmtpHost: "${EMAIL_SMTP_HOST:-}"
      Email__SmtpPort: "${EMAIL_SMTP_PORT:-587}"
      Email__UseSsl: "${EMAIL_USE_SSL:-false}"
      Email__Username: "${EMAIL_USERNAME:-}"
      Email__Password: "${EMAIL_PASSWORD:-}"
      Email__FromAddress: "${EMAIL_FROM:-nest@yourdomain.com}"
      Email__FromName: "${EMAIL_FROM_NAME:-Nest}"
    ports:
      - "5000:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_URL: http://api:8080
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: http://api:8080
    ports:
      - "3000:3000"



volumes:
  postgres_data:
  minio_data:
