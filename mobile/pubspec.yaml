name: nest
description: Nest — Personal Finance mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  riverpod: ^3.0.0
  flutter_riverpod: ^3.0.0

  # Navigation
  go_router: ^17.0.0

  # HTTP
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.3

  # Charts
  fl_chart: ^1.0.0

  # UI
  google_fonts: ^8.0.0
  material_symbols_icons: ^4.2781.0

  # Notifications
  flutter_local_notifications: ^22.0.0

  # Utils
  intl: ^0.20.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^3.0.0
  json_serializable: ^6.14.0
  retrofit_generator: ^10.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: InterTight
      fonts:
        - asset: assets/fonts/InterTight-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/InterTight-Bold.ttf
          weight: 700
        - asset: assets/fonts/InterTight-ExtraBold.ttf
          weight: 800
